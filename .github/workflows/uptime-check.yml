name: Uptime Background Checker

on:
  schedule:
    - cron: '*/2 * * * *'     # هر ۲ دقیقه یکبار (می‌تونی تغییر بدی)
  workflow_dispatch:          # امکان اجرای دستی

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: شروع چک از طریق Supabase Edge Function
        run: |
          curl -X POST "https://YOUR-PROJECT.supabase.co/functions/v1/check-uptime" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "job_id": 9999,
              "target_url": "https://arsacia.ir",
              "check_count": 1,
              "interval_ms": 2000
            }'
