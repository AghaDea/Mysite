name: Uptime Fast Checker

on:
  schedule:
    - cron: '*/1 * * * *'     # هر ۱ دقیقه (سریع‌ترین حالت ممکن در Actions)
  workflow_dispatch:

jobs:
  fast-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: چک سریع سایت
        run: |
          curl -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/check-uptime" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "job_id": 0,
              "target_url": "https://forum.arsacia.ir/profile/30928-dea/",
              "check_count": 5,
              "interval_ms": 1000
            }'
