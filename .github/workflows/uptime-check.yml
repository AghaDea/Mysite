name: Uptime Background Checker

on:
  schedule:
    - cron: '*/1 * * * *'      # هر ۳ دقیقه یک چک (می‌تونی تغییر بدی)
  workflow_dispatch:

jobs:
  uptime-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: ارسال درخواست به Edge Function
        run: |
          curl -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/check-uptime" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "job_id": 0,
              "target_url": "https://arsacia.ir",
              "check_count": 1,
              "interval_ms": 1000
            }'
