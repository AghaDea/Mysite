<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Game</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial;}
body{display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(135deg,#0f0f0f,#1c1c1c);}
.phone{width:360px;height:720px;border-radius:35px;background:#000;box-shadow:0 0 40px #000;border:2px solid #333;overflow:hidden;}
.top-bar{width:100%;height:35px;background:#222;display:flex;justify-content:space-between;align-items:center;padding:0 10px;color:white;font-size:13px;}
.screen{padding:10px;height:calc(100% - 35px);display:flex;flex-direction:column;align-items:center;background:#111;}
.display{width:95%;height:65px;background:#eee;color:#000;font-size:30px;text-align:center;line-height:65px;border-radius:15px;margin:10px 0;font-weight:bold;}
.keyboard{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;}
.keyboard button{height:90px;font-size:36px;border-radius:20px;border:none;background:#eee;color:red;font-weight:bold;transition:0.2s;}
.keyboard button:active{transform:scale(0.95);}
.actions{display:flex;width:100%;margin-top:10px;}
.actions button{flex:1;height:60px;margin:0 5px;font-size:20px;border:none;border-radius:15px;}
.clear{background:#555;color:white;}
.set{background:#0a84ff;color:white;}
.message{margin-top:8px;font-size:18px;font-weight:bold;text-align:center;}
.users{width:95%;margin-top:15px;color:white;overflow:auto;max-height:200px;background:#1a1a1a;padding:8px;border-radius:10px;}
.users h3{text-align:center;margin-bottom:6px;color:#0af;}
.users ul{list-style:none;padding:0;}
.users li{padding:4px 0;border-bottom:1px solid #333;text-align:center;}
</style>
</head>

<body>

<div class="phone">
  <div class="top-bar">
    <div>📶</div>
    <div>Number Game</div>
    <div>🔋</div>
  </div>

  <div class="screen">

      <div class="display" id="display">---</div>

      <div class="keyboard">
        <button onclick="pressNum(1)">1</button>
        <button onclick="pressNum(2)">2</button>
        <button onclick="pressNum(3)">3</button>
        <button onclick="pressNum(4)">4</button>
        <button onclick="pressNum(5)">5</button>
        <button onclick="pressNum(6)">6</button>
        <button onclick="pressNum(7)">7</button>
        <button onclick="pressNum(8)">8</button>
        <button onclick="pressNum(9)">9</button>
        <button onclick="pressNum(0)">0</button>
      </div>

      <div class="actions">
        <button class="clear" onclick="clearGuess()">Clear</button>
        <button class="set" onclick="setGuess()">Set</button>
      </div>

      <div id="message" class="message"></div>

      <div class="users">
        <h3>All Users</h3>
        <ul id="users_list"></ul>
      </div>

  </div>
</div>

<script>
let currentGuess = "";
let secretNumber = Math.floor(Math.random()*500000)+1;

// گرفتن لیست کاربران
function getUsers(){
    return JSON.parse(localStorage.getItem("allUsers") || "[]");
}

// ذخیره لیست کاربران
function saveUsers(users){
    localStorage.setItem("allUsers", JSON.stringify(users));
}

// ساخت کاربر اگر وجود نداشت
function createUserIfNotExists(){
    let myUser = localStorage.getItem("myUser");
    if(!myUser){
        let users = getUsers();
        let newName;
        do{
            newName = "user" + Math.floor(Math.random()*9000+1000);
        }while(users.includes(newName));
        users.push(newName);
        saveUsers(users);
        localStorage.setItem("myUser", newName);
        return newName;
    }
    return myUser;
}

// نمایش کاربران
function updateUsers(){
    let users = getUsers();
    let list = "";
    users.forEach(u=>{
        list += "<li>"+u+"</li>";
    });
    document.getElementById("users_list").innerHTML = list;
}

// دکمه ها
function pressNum(n){
    currentGuess += n;
    document.getElementById("display").innerText = currentGuess;
}

function clearGuess(){
    currentGuess = "";
    document.getElementById("display").innerText = "---";
}

function setGuess(){
    if(currentGuess === "") return;

    createUserIfNotExists(); // ساخت کاربر در اولین Set

    let guess = parseInt(currentGuess);

    if(guess < secretNumber){
        showMessage("Higher 🔼","yellow");
    }else if(guess > secretNumber){
        showMessage("Lower 🔽","lightgreen");
    }else{
        showMessage("🎉 Correct!","cyan");
        secretNumber = Math.floor(Math.random()*500000)+1;
    }

    currentGuess="";
    document.getElementById("display").innerText="---";
    updateUsers();
}

function showMessage(msg,color){
    let m = document.getElementById("message");
    m.innerText = msg;
    m.style.color = color;
}

// بارگذاری اولیه
updateUsers();
</script>

</body>
</html>
