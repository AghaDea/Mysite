<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Media Upload</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050505;
overflow-x:hidden;
color:white;
min-height:100vh;
}

.bg{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at top left,#00f0ff33,transparent 30%),
radial-gradient(circle at bottom right,#ff00ff33,transparent 30%),
#050505;
z-index:-1;
animation:bgmove 10s linear infinite alternate;
}

@keyframes bgmove{
0%{filter:hue-rotate(0deg);}
100%{filter:hue-rotate(90deg);}
}

.container{
width:95%;
max-width:900px;
margin:auto;
padding:20px;
}

.title{
font-size:40px;
font-weight:bold;
text-align:center;
margin-top:20px;
background:linear-gradient(90deg,#00f0ff,#ff00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.uploadBox{
margin-top:30px;
border:2px dashed #00f0ff;
border-radius:25px;
padding:50px 20px;
text-align:center;
background:#111;
transition:.3s;
position:relative;
overflow:hidden;
}

.uploadBox:hover{
transform:scale(1.01);
box-shadow:0 0 40px #00f0ff55;
}

.uploadBox input{
display:none;
}

.uploadBtn{
padding:15px 35px;
border:none;
border-radius:20px;
background:linear-gradient(45deg,#00f0ff,#ff00ff);
color:white;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

.progress{
margin-top:20px;
height:20px;
background:#222;
border-radius:20px;
overflow:hidden;
display:none;
}

.progress div{
height:100%;
width:0%;
background:linear-gradient(90deg,#00f0ff,#ff00ff);
transition:.2s;
}

.gallery{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
}

.card{
background:#111;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 20px #000;
animation:fade .5s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:none;
}
}

.card img,
.card video{
width:100%;
max-height:250px;
object-fit:cover;
background:black;
}

.info{
padding:15px;
}

.link{
display:block;
margin-top:10px;
padding:10px;
text-align:center;
background:#00f0ff22;
border-radius:12px;
color:#00f0ff;
text-decoration:none;
word-break:break-all;
}

.copy{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:12px;
background:#ff00ff;
color:white;
font-weight:bold;
cursor:pointer;
}

.live{
position:fixed;
top:10px;
right:10px;
padding:10px 15px;
background:#00ff99;
border-radius:20px;
font-size:14px;
font-weight:bold;
box-shadow:0 0 20px #00ff99;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="live">● LIVE SERVER</div>

<div class="container">

<div class="title">
MEDIA CLOUD
</div>

<div class="uploadBox" onclick="pickFile()">
<h2>Upload Photo Or Video</h2>
<br>
<button class="uploadBtn">
Choose File
</button>

<input type="file" id="fileInput" accept="image/*,video/*">
<div class="progress">
<div id="bar"></div>
</div>

</div>

<div class="gallery" id="gallery"></div>

</div>

<script>

const SUPABASE_URL = "https://tyxozdllmnfnonjirath.supabase.co";

const SUPABASE_KEY = "sb_publishable_lI8fDXUKUYzqZKZ6KcDFVA_g9G0uztm";

const client = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

const input = document.getElementById("fileInput");
const gallery = document.getElementById("gallery");
const progress = document.querySelector(".progress");
const bar = document.getElementById("bar");

function pickFile(){
input.click();
}

input.addEventListener("change", async ()=>{

const file = input.files[0];
if(!file) return;

progress.style.display="block";

let percent = 0;

const fake = setInterval(()=>{
percent+=5;
if(percent<=90){
bar.style.width=percent+"%";
}
},100);

const ext = file.name.split(".").pop();

const random =
Math.random().toString(36).substring(2,10);

const filename =
Date.now()+"_"+random+"."+ext;

const { error } = await client.storage
.from("files")
.upload(filename,file);

clearInterval(fake);

if(error){
alert(error.message);
return;
}

bar.style.width="100%";

setTimeout(()=>{
progress.style.display="none";
bar.style.width="0%";
},1000);

const { data } = client.storage
.from("files")
.getPublicUrl(filename);

const url = data.publicUrl;

addCard(url,file.type);

});

function addCard(url,type){

const card = document.createElement("div");
card.className="card";

let media="";

if(type.startsWith("image")){
media = `<img src="${url}">`;
}else{
media = `
<video controls>
<source src="${url}">
</video>
`;
}

card.innerHTML = `
${media}

<div class="info">

<div>
Secret Link
</div>

<a class="link" href="${url}" target="_blank">
${url}
</a>

<button class="copy">
Copy Link
</button>

</div>
`;

gallery.prepend(card);

card.querySelector(".copy")
.onclick = ()=>{
navigator.clipboard.writeText(url);
alert("Copied");
};

}

</script>

</body>
</html>
