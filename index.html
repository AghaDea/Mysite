<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مانیتور Uptime</title>
  <style>
    body { font-family: Tahoma; margin: 15px; background: #f8f9fa; }
    h1 { text-align: center; }
    input, button { padding: 12px; margin: 8px 0; font-size: 16px; width: 100%; border-radius: 8px; }
    button { border: none; cursor: pointer; }
    .start { background: #0066ff; color: white; }
    .stop { background: #ff4444; color: white; }
    .delete { background: #666; color: white; }
    #logs { background: white; padding: 15px; border-radius: 8px; min-height: 300px; margin-top: 15px; }
    .log { padding: 8px; border-bottom: 1px solid #eee; }
    .progress { font-weight: bold; color: #0066ff; }
  </style>
</head>
<body>
  <h1>چک‌کننده وضعیت سایت</h1>
  
  <input type="url" id="url" value="" placeholder="لینک سایت">
  
  <input type="number" id="count" value="5000" min="1" placeholder="تعداد چک (پیشفرض ۳۰)">
  <input type="number" id="interval" value="2000" min="1000" placeholder="فاصله هر چک (میلی‌ثانیه) - ۲۰۰۰ = ۲ ثانیه">
  
  <button class="start" onclick="startBackgroundCheck()">شروع چک پس‌زمینه‌ای</button>

  <div id="active-jobs"></div>
  <div id="logs"></div>

  <script type="module" src="script.js"></script>
</body>
</html>
