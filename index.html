<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dea Upload</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#1e293b;
border-radius:20px;
padding:25px;
margin-bottom:20px;
box-shadow:0 0 30px rgba(0,0,0,.3);
}

h1{
text-align:center;
margin-bottom:15px;
}

.subtitle{
text-align:center;
opacity:.8;
margin-bottom:25px;
}

.upload-box{
border:2px dashed #38bdf8;
padding:30px;
border-radius:20px;
text-align:center;
}

input[type=file]{
display:block;
width:100%;
margin-top:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#38bdf8;
color:white;
font-size:16px;
cursor:pointer;
margin-top:15px;
}

button:hover{
opacity:.9;
}

.progress{
height:22px;
background:#334155;
border-radius:30px;
overflow:hidden;
margin-top:15px;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
transition:.3s;
}

.preview{
margin-top:20px;
text-align:center;
}

.preview img{
max-width:100%;
border-radius:15px;
}

.preview video{
width:100%;
border-radius:15px;
}

.preview audio{
width:100%;
}

.linkbox{
margin-top:15px;
background:#0f172a;
padding:15px;
border-radius:12px;
word-break:break-all;
}

a{
color:#38bdf8;
}

.info{
margin-top:15px;
line-height:2;
}

.footer{
text-align:center;
opacity:.6;
margin-top:20px;
}

</style>
</head>
<body>

<div class="container">

<div class="card">

<h1>Dea Upload</h1>

<div class="subtitle">
Image • Video • Audio Upload
</div>

<div class="upload-box">

انتخاب فایل

<input id="file" type="file">

<button onclick="uploadFile()">
آپلود فایل
</button>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<div id="status" class="info"></div>

<div id="preview" class="preview"></div>

</div>

</div>

<div class="footer">
Max File Size : 30MB
</div>

</div>

<script>

const SUPABASE_URL =
"https://tyxozdllmnfnonjirath.supabase.co";

const SUPABASE_KEY =
"sb_publishable_lI8fDXUKUYzqZKZ6KcDFVA_g9G0uztm";

const supabase =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

const MAX_SIZE =
30 * 1024 * 1024;

const allowed = [

"image/jpeg",
"image/png",
"image/webp",

"video/mp4",
"video/webm",

"audio/mpeg",
"audio/wav",
"audio/ogg"

];

async function uploadFile(){

const file =
document.getElementById("file").files[0];

if(!file){
alert("فایل انتخاب نشده");
return;
}

if(file.size > MAX_SIZE){
alert("حداکثر حجم 30MB");
return;
}

if(!allowed.includes(file.type)){
alert("فقط عکس، فیلم یا آهنگ");
return;
}

const ext =
file.name.split(".").pop();

const fileName =
Date.now() +
"_" +
Math.random()
.toString(36)
.substring(2,8)
+
"." +
ext;

document.getElementById("status")
.innerHTML =
"در حال آپلود...";

document.getElementById("bar")
.style.width="20%";

const result =
await supabase.storage
.from("files")
.upload(
fileName,
file
);

if(result.error){

document.getElementById("status")
.innerHTML =
result.error.message;

return;

}

document.getElementById("bar")
.style.width="100%";

const fileUrl =
SUPABASE_URL +
"/storage/v1/object/public/files/" +
fileName;

let preview="";

if(file.type.startsWith("image/")){

preview =
`<img src="${fileUrl}">`;

}

else if(
file.type.startsWith("video/")
){

preview =
`<video controls src="${fileUrl}"></video>`;

}

else if(
file.type.startsWith("audio/")
){

preview =
`<audio controls src="${fileUrl}"></audio>`;

}

document.getElementById("preview")
.innerHTML =
preview;

document.getElementById("status")
.innerHTML =

`
فایل با موفقیت آپلود شد

<div class="linkbox">

<a href="${fileUrl}"
target="_blank">

${fileUrl}

</a>

</div>

<div class="info">

نام فایل:
${fileName}

<br>

حجم:
${(
file.size /
1024 /
1024
).toFixed(2)}
 MB

<br>

نوع:
${file.type}

<br>

زمان:
${new Date()
.toLocaleString()}

</div>
`;

}

</script>

</body>
</html>
