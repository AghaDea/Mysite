<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Game X</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

:root{
--bg:#050816;
--card:#0f1729cc;
--cyan:#00f7ff;
--pink:#ff00d4;
--green:#00ff99;
--glass:rgba(255,255,255,.06);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at top left,#00f7ff22,transparent 25%),
radial-gradient(circle at bottom right,#ff00d422,transparent 25%),
linear-gradient(160deg,#03060f,#081122,#050816);
}

/* ultra optimized animated background */

.bg{
position:absolute;
inset:0;
overflow:hidden;
z-index:0;
}

.glow{
position:absolute;
border-radius:50%;
filter:blur(80px);
opacity:.35;
animation:move 18s linear infinite alternate;
will-change:transform;
}

.glow:nth-child(1){
width:260px;
height:260px;
background:var(--cyan);
top:-80px;
left:-60px;
}

.glow:nth-child(2){
width:300px;
height:300px;
background:var(--pink);
bottom:-120px;
right:-100px;
animation-duration:24s;
}

@keyframes move{
0%{transform:translate(0,0) scale(1);}
100%{transform:translate(50px,-30px) scale(1.2);}
}

.phone{
position:relative;
width:380px;
height:760px;
border-radius:42px;
overflow:hidden;
background:var(--card);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.08);
box-shadow:
0 0 40px #000,
0 0 60px #00f7ff22,
inset 0 0 20px #ffffff10;
z-index:1;
}

/* top */

.top{
height:42px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 16px;
color:#fff;
font-size:13px;
background:rgba(255,255,255,.03);
border-bottom:1px solid rgba(255,255,255,.05);
}

/* content */

.content{
padding:16px;
height:calc(100% - 42px);
display:flex;
flex-direction:column;
}

/* title */

.logo{
font-size:30px;
font-weight:900;
text-align:center;
margin-top:4px;
background:linear-gradient(90deg,var(--cyan),var(--pink));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
letter-spacing:2px;
}

/* display */

.display-wrap{
margin-top:18px;
position:relative;
}

.display{
height:90px;
border-radius:26px;
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
font-weight:900;
color:white;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.06);
box-shadow:
inset 0 0 15px #ffffff10,
0 0 30px #00f7ff18;
letter-spacing:3px;
transition:.15s;
}

.display-glow{
position:absolute;
inset:0;
border-radius:26px;
background:linear-gradient(90deg,#00f7ff22,#ff00d422);
filter:blur(18px);
z-index:-1;
}

/* stats */

.stats{
margin-top:12px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.stat{
height:70px;
border-radius:22px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.06);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
font-size:12px;
backdrop-filter:blur(10px);
}

.stat b{
font-size:20px;
margin-top:5px;
color:var(--cyan);
}

/* keyboard */

.keyboard{
margin-top:18px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.key{
height:82px;
border:none;
border-radius:24px;
font-size:30px;
font-weight:900;
color:white;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.06);
backdrop-filter:blur(12px);
box-shadow:
0 0 10px #000,
inset 0 0 10px #ffffff10;
transition:.08s;
will-change:transform;
}

.key:active{
transform:scale(.92);
background:#00f7ff33;
}

/* actions */

.actions{
display:flex;
gap:10px;
margin-top:14px;
}

.actions button{
flex:1;
height:62px;
border:none;
border-radius:22px;
font-size:18px;
font-weight:900;
color:white;
transition:.15s;
}

.clear{
background:linear-gradient(145deg,#444,#222);
}

.set{
background:linear-gradient(145deg,var(--cyan),var(--pink));
box-shadow:0 0 25px #00f7ff55;
}

.actions button:active{
transform:scale(.96);
}

/* message */

.message{
height:42px;
margin-top:12px;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
font-weight:900;
text-shadow:0 0 15px currentColor;
}

/* users */

.users{
margin-top:10px;
flex:1;
overflow:auto;
border-radius:24px;
padding:14px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
scrollbar-width:none;
}

.users h3{
text-align:center;
margin-bottom:12px;
font-size:20px;
color:var(--cyan);
}

.user{
height:54px;
margin-bottom:10px;
border-radius:18px;
display:flex;
align-items:center;
padding:0 16px;
color:white;
font-size:16px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.05);
transition:.12s;
}

.user:hover{
transform:translateX(3px);
background:#00f7ff11;
}

/* live bars */

.live{
position:absolute;
bottom:0;
left:0;
width:100%;
height:90px;
display:flex;
align-items:flex-end;
justify-content:center;
gap:5px;
opacity:.15;
pointer-events:none;
}

.live span{
width:8px;
border-radius:10px 10px 0 0;
background:linear-gradient(to top,var(--cyan),var(--pink));
animation:bars 1s ease-in-out infinite;
}

.live span:nth-child(2){animation-delay:.1s;}
.live span:nth-child(3){animation-delay:.2s;}
.live span:nth-child(4){animation-delay:.3s;}
.live span:nth-child(5){animation-delay:.4s;}
.live span:nth-child(6){animation-delay:.5s;}

@keyframes bars{
0%,100%{height:15px;}
50%{height:70px;}
}

/* responsive */

@media(max-width:420px){
.phone{
width:100vw;
height:100vh;
border-radius:0;
}
}

</style>
</head>

<body>

<div class="bg">
<div class="glow"></div>
<div class="glow"></div>
</div>

<div class="phone">

<div class="top">
<div>📶 5G</div>
<div id="clock">12:00</div>
<div>🔋100%</div>
</div>

<div class="content">

<div class="logo">NUMBER GAME X</div>

<div class="display-wrap">
<div class="display-glow"></div>
<div class="display" id="display">---</div>
</div>

<div class="stats">
<div class="stat">USERS<b id="userCount">0</b></div>
<div class="stat">TRIES<b id="tries">0</b></div>
<div class="stat">LEVEL<b>∞</b></div>
</div>

<div class="keyboard">

<button class="key" onclick="pressNum(1)">1</button>
<button class="key" onclick="pressNum(2)">2</button>
<button class="key" onclick="pressNum(3)">3</button>

<button class="key" onclick="pressNum(4)">4</button>
<button class="key" onclick="pressNum(5)">5</button>
<button class="key" onclick="pressNum(6)">6</button>

<button class="key" onclick="pressNum(7)">7</button>
<button class="key" onclick="pressNum(8)">8</button>
<button class="key" onclick="pressNum(9)">9</button>

<button class="key" onclick="pressNum(0)">0</button>

</div>

<div class="actions">
<button class="clear" onclick="clearGuess()">CLEAR</button>
<button class="set" onclick="setGuess()">SET</button>
</div>

<div class="message" id="message"></div>

<div class="users">
<h3>ONLINE USERS</h3>
<div id="users_list"></div>
</div>

</div>

<div class="live">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>

</div>

<script>

/* ultra optimized */

let currentGuess="";
let secretNumber=Math.floor(Math.random()*500000)+1;
let tries=0;

/* clock */

const clock=document.getElementById("clock");

function updateClock(){
const d=new Date();
clock.innerText=
String(d.getHours()).padStart(2,'0')
+":"+
String(d.getMinutes()).padStart(2,'0');
}

updateClock();
setInterval(updateClock,1000);

/* users */

function getUsers(){
return JSON.parse(localStorage.getItem("allUsers")||"[]");
}

function saveUsers(users){
localStorage.setItem("allUsers",JSON.stringify(users));
}

function createUserIfNotExists(){

let myUser=localStorage.getItem("myUser");

if(!myUser){

let users=getUsers();
let name;

do{
name="user"+Math.floor(Math.random()*9000+1000);
}
while(users.includes(name));

users.push(name);

saveUsers(users);

localStorage.setItem("myUser",name);

return name;
}

return myUser;
}

function updateUsers(){

const users=getUsers();

document.getElementById("userCount").innerText=users.length;

document.getElementById("users_list").innerHTML=
users.map(u=>
`<div class="user">⚡ ${u}</div>`
).join('');

}

/* game */

function pressNum(n){

if(currentGuess.length>=8)return;

currentGuess+=n;

document.getElementById("display").innerText=currentGuess;

navigator.vibrate?.(15);

}

function clearGuess(){

currentGuess="";

document.getElementById("display").innerText="---";

showMessage("CLEARED","#aaa");

}

function setGuess(){

if(currentGuess==="")return;

createUserIfNotExists();

tries++;

document.getElementById("tries").innerText=tries;

const guess=parseInt(currentGuess);

if(guess<secretNumber){

showMessage("HIGHER 🔼","#ffe600");

}
else if(guess>secretNumber){

showMessage("LOWER 🔽","#00ff99");

}
else{

showMessage("🎉 CORRECT","#00f7ff");

secretNumber=Math.floor(Math.random()*500000)+1;

tries=0;

document.getElementById("tries").innerText=0;

}

currentGuess="";

document.getElementById("display").innerText="---";

updateUsers();

}

/* messages */

const msg=document.getElementById("message");

function showMessage(text,color){

msg.innerText=text;

msg.style.color=color;

msg.animate([
{transform:'scale(0.8)',opacity:0},
{transform:'scale(1.1)',opacity:1},
{transform:'scale(1)',opacity:1}
],{
duration:300
});

}

/* init */

updateUsers();

</script>

</body>
</html>
