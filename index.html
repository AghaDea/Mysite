<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Dea Upload</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

h1{
margin-bottom:15px;
}

input{
width:100%;
padding:15px;
border-radius:12px;
border:none;
margin-top:10px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.progress{
height:20px;
background:#334155;
border-radius:20px;
overflow:hidden;
margin-top:15px;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
transition:.3s;
}

.file{
background:#334155;
padding:12px;
border-radius:12px;
margin-top:10px;
word-break:break-all;
}

a{
color:#38bdf8;
text-decoration:none;
}

canvas{
width:100%;
height:300px;
background:#111827;
border-radius:15px;
}

.info{
margin-top:10px;
line-height:1.8;
}

</style>
</head>
<body>

<div class="container">

<div class="card">

<h1>Upload Center</h1>

<input id="file" type="file">

<button onclick="uploadFile()">
UPLOAD
</button>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<div class="info" id="status"></div>

</div>

<div class="card">

<h2>Today's Upload Chart</h2>

<canvas
id="chart"
width="900"
height="300">
</canvas>

</div>

<div class="card">

<h2>Recent Uploads</h2>

<div id="files"></div>

</div>

</div>

<script>

const SUPABASE_URL =
"https://tyxozdllmnfnonjirath.supabase.co";

const SUPABASE_KEY =
"sb_publishable_lI8fDXUKUYzqZKZ6KcDFVA_g9G0uztm";

const supabase =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

const allowedMime = [

"image/jpeg",
"image/png",
"image/webp",

"video/mp4",
"video/webm",

"audio/mpeg",
"audio/wav",
"audio/ogg"

];

const allowedExt = [

"jpg",
"jpeg",
"png",
"webp",

"mp4",
"webm",

"mp3",
"wav",
"ogg"

];

const MAX_SIZE =
30 * 1024 * 1024;

async function uploadFile(){

const file =
document.getElementById("file").files[0];

if(!file){

alert("Select file");

return;

}

if(file.size > MAX_SIZE){

alert("Max 30MB");

return;

}

const ext =
file.name
.split(".")
.pop()
.toLowerCase();

if(
!allowedMime.includes(file.type)
||
!allowedExt.includes(ext)
){

alert("File type not allowed");

return;

}

const fileName =
Date.now()
+
"_"
+
Math.random()
.toString(36)
.slice(2,8)
+
"."
+
ext;

document.getElementById("status")
.innerHTML =
"Uploading...";

document.getElementById("bar")
.style.width =
"50%";

const upload =
await supabase
.storage
.from("files")
.upload(
fileName,
file
);

if(upload.error){

alert(upload.error.message);

return;

}

document.getElementById("bar")
.style.width =
"100%";

await supabase
.from("uploads")
.insert({

filename:fileName,

filetype:file.type,

created_at:
new Date()
.toISOString()

});

const customLink =

location.origin
+
"/f/"
+
fileName;

document.getElementById("status")
.innerHTML =

`
Uploaded Successfully

<br><br>

<a href="${customLink}"
target="_blank">

${customLink}

</a>
`;

loadFiles();

drawChart();

}

async function loadFiles(){

const box =
document.getElementById("files");

box.innerHTML =
"Loading...";

const result =
await supabase
.from("uploads")
.select("*")
.order(
"created_at",
{
ascending:false
}
)
.limit(30);

box.innerHTML="";

result.data.forEach(item=>{

const link =

location.origin
+
"/f/"
+
item.filename;

box.innerHTML +=

`
<div class="file">

<b>${item.filename}</b>

<br>

${item.filetype}

<br>

${new Date(
item.created_at
).toLocaleString()}

<br><br>

<a href="${link}"
target="_blank">

${link}

</a>

</div>
`;

});

}

async function drawChart(){

const today =
new Date()
.toISOString()
.split("T")[0];

const result =
await supabase
.from("uploads")
.select("*");

const hours =
Array(24).fill(0);

result.data.forEach(item=>{

const d =
new Date(
item.created_at
);

const day =
d.toISOString()
.split("T")[0];

if(day===today){

hours[
d.getHours()
]++;

}

});

const canvas =
document.getElementById(
"chart"
);

const ctx =
canvas.getContext("2d");

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

ctx.beginPath();

for(
let i=0;
i<24;
i++
){

const x =
(i/23)
*
canvas.width;

const y =
canvas.height
-
(
hours[i]
*
15
);

if(i===0)
ctx.moveTo(x,y);
else
ctx.lineTo(x,y);

}

ctx.lineWidth=3;
ctx.strokeStyle="white";
ctx.stroke();

for(
let i=0;
i<24;
i++
){

const x =
(i/23)
*
canvas.width;

ctx.fillText(
i+":00",
x,
290
);

}

}

loadFiles();

drawChart();

</script>

</body>
</html>
