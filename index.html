<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دانلودر همه‌جا</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%); }
        .card { box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5); }
    </style>
</head>
<body class="min-h-screen text-white">
    <div class="max-w-3xl mx-auto px-4 py-12">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-bold mb-2 bg-gradient-to-r from-pink-500 to-purple-500 bg-clip-text text-transparent">
                دانلودر همه‌جا
            </h1>
            <p class="text-slate-400">اینستاگرام • تیک‌تاک • X • Pornhub • و ...</p>
        </div>

        <!-- Input -->
        <div class="bg-slate-900 rounded-3xl p-6 card">
            <div class="flex gap-3">
                <input 
                    id="urlInput"
                    type="text" 
                    placeholder="لینک ویدیو را Paste کنید..."
                    class="flex-1 bg-slate-800 border border-slate-700 focus:border-pink-500 rounded-2xl px-6 py-5 outline-none text-lg">
                <button onclick="fetchVideo()" 
                        class="bg-gradient-to-r from-pink-500 to-purple-600 hover:from-pink-600 hover:to-purple-700 px-8 rounded-2xl font-semibold flex items-center gap-2">
                    <i class="fa-solid fa-download"></i>
                    <span>گرفتن</span>
                </button>
            </div>
        </div>

        <!-- Result -->
        <div id="result" class="hidden mt-8 bg-slate-900 rounded-3xl overflow-hidden card">
            
            <!-- Preview -->
            <div class="relative bg-black aspect-video">
                <img id="thumbnail" class="w-full h-full object-cover" alt="thumbnail">
                <div class="absolute inset-0 flex items-center justify-center">
                    <button onclick="playVideo()" 
                            class="bg-white/90 hover:bg-white text-black w-16 h-16 rounded-full flex items-center justify-center text-3xl shadow-2xl transition">
                        <i class="fa-solid fa-play ml-1"></i>
                    </button>
                </div>
                <video id="videoPlayer" class="hidden w-full h-full" controls></video>
            </div>

            <!-- Info -->
            <div class="p-6">
                <h2 id="title" class="text-2xl font-bold mb-2"></h2>
                <div class="flex gap-4 text-sm mb-6">
                    <span id="platform" class="px-4 py-1 bg-slate-800 rounded-full"></span>
                    <span id="duration" class="flex items-center gap-1 text-slate-400"></span>
                </div>

                <!-- Download Button -->
                <button onclick="startDownload()" 
                        class="w-full bg-emerald-500 hover:bg-emerald-600 py-5 rounded-2xl text-xl font-bold flex items-center justify-center gap-3 transition-all">
                    <i class="fa-solid fa-download"></i>
                    دانلود فیلم (کیفیت بالا)
                </button>

                <div class="mt-6 grid grid-cols-3 gap-3 text-center text-sm" id="qualities">
                    <!-- JS will fill -->
                </div>
            </div>
        </div>

        <div id="empty" class="text-center text-slate-500 mt-20">
            <i class="fa-solid fa-link text-6xl mb-4 opacity-40"></i>
            <p>لینک را وارد کنید</p>
        </div>
    </div>

    <script>
        function detectPlatform(url) {
            if (url.includes("instagram.com")) return "Instagram";
            if (url.includes("tiktok.com")) return "TikTok";
            if (url.includes("x.com") || url.includes("twitter.com")) return "X";
            if (url.includes("pornhub.com")) return "Pornhub";
            return "Video";
        }

        async function fetchVideo() {
            const url = document.getElementById("urlInput").value.trim();
            if (!url) return alert("لینک را وارد کنید!");

            document.getElementById("empty").classList.add("hidden");
            const result = document.getElementById("result");
            result.classList.remove("hidden");

            // Mock Data (برای دمو)
            const data = {
                title: "عنوان ویدیو از لینک وارد شده",
                platform: detectPlatform(url),
                duration: "۱:۴۵",
                thumbnail: "https://picsum.photos/id/1015/1280/720",
                videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"
            };

            document.getElementById("title").textContent = data.title;
            document.getElementById("platform").textContent = data.platform;
            document.getElementById("duration").innerHTML = `⏱ ${data.duration}`;
            document.getElementById("thumbnail").src = data.thumbnail;

            // Qualities
            const qualitiesHTML = `
                <div class="bg-slate-800 rounded-2xl p-3 hover:bg-slate-700 cursor-pointer" onclick="fakeDownload('720p')">720p</div>
                <div class="bg-slate-800 rounded-2xl p-3 hover:bg-slate-700 cursor-pointer" onclick="fakeDownload('1080p')">1080p</div>
                <div class="bg-slate-800 rounded-2xl p-3 hover:bg-slate-700 cursor-pointer" onclick="fakeDownload('480p')">480p</div>
            `;
            document.getElementById("qualities").innerHTML = qualitiesHTML;
        }

        function playVideo() {
            const thumb = document.getElementById("thumbnail");
            const player = document.getElementById("videoPlayer");
            thumb.classList.add("hidden");
            player.classList.remove("hidden");
            player.src = "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4";
            player.play();
        }

        function startDownload() {
            alert("در حال دانلود...\n\n(این نسخه دمو است. برای کار واقعی نیاز به سرور بک‌اند دارید)");
        }

        function fakeDownload(quality) {
            alert(`در حال دانلود نسخه ${quality} ...`);
        }

        // Enter key support
        document.getElementById("urlInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") fetchVideo();
        });
    </script>
</body>
</html>
