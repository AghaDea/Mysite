<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUMBER GAME OMEGA</title>

<style>

:root{
--bg:#060816;
--card:#101827;
--cyan:#00f0ff;
--pink:#ff00c8;
--green:#00ff99;
--white:#ffffff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(135deg,#030712,#0a1020,#050816);
}

/* optimized bg */

.bg{
position:fixed;
inset:0;
overflow:hidden;
z-index:0;
}

.circle{
position:absolute;
border-radius:50%;
filter:blur(60px);
opacity:.18;
animation:float 12s linear infinite alternate;
will-change:transform;
}

.c1{
width:240px;
height:240px;
background:var(--cyan);
top:-60px;
left:-60px;
}

.c2{
width:260px;
height:260px;
background:var(--pink);
bottom:-80px;
right:-80px;
animation-duration:18s;
}

@keyframes float{
0%{transform:translate(0,0);}
100%{transform:translate(40px,-20px);}
}

/* phone */

.phone{
position:relative;
width:390px;
height:780px;
background:rgba(16,24,39,.96);
border:1px solid rgba(255,255,255,.06);
border-radius:38px;
overflow:hidden;
box-shadow:
0 0 30px #000,
0 0 40px #00f0ff22;
z-index:2;
}

/* topbar */

.topbar{
height:42px;
padding:0 16px;
display:flex;
justify-content:space-between;
align-items:center;
background:#0d1322;
color:#fff;
font-size:13px;
border-bottom:1px solid rgba(255,255,255,.05);
}

/* content */

.content{
padding:16px;
height:calc(100% - 42px);
display:flex;
flex-direction:column;
}

/* logo */

.logo{
font-size:32px;
font-weight:900;
text-align:center;
color:white;
letter-spacing:2px;
margin-top:5px;
text-shadow:
0 0 8px var(--cyan),
0 0 18px var(--cyan);
}

/* display */

.display{
margin-top:18px;
height:90px;
border-radius:24px;
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
font-weight:900;
background:#0d1425;
color:white;
border:1px solid rgba(255,255,255,.05);
box-shadow:
inset 0 0 12px #ffffff10,
0 0 18px #00f0ff22;
transition:.08s;
}

/* stats */

.stats{
margin-top:12px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
}

.card{
height:68px;
border-radius:18px;
background:#11192d;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
border:1px solid rgba(255,255,255,.05);
color:#aaa;
font-size:11px;
}

.card b{
font-size:18px;
margin-top:5px;
color:white;
}

/* keyboard */

.keyboard{
margin-top:16px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.key{
height:84px;
border:none;
border-radius:22px;
font-size:32px;
font-weight:900;
background:#131d33;
color:white;
border:1px solid rgba(255,255,255,.05);
transition:.05s;
}

.key:active{
transform:scale(.93);
background:#1d2a48;
}

/* actions */

.actions{
display:flex;
gap:10px;
margin-top:12px;
}

.actions button{
flex:1;
height:60px;
border:none;
border-radius:20px;
font-size:18px;
font-weight:900;
color:white;
}

.clear{
background:#2b3448;
}

.set{
background:linear-gradient(135deg,var(--cyan),var(--pink));
}

/* message */

.message{
margin-top:12px;
height:40px;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
font-weight:900;
}

/* users */

.users{
margin-top:10px;
flex:1;
overflow:auto;
border-radius:22px;
background:#0d1424;
padding:12px;
border:1px solid rgba(255,255,255,.05);
}

.users::-webkit-scrollbar{
display:none;
}

.users h3{
text-align:center;
color:var(--cyan);
margin-bottom:10px;
font-size:20px;
}

.user{
height:52px;
display:flex;
align-items:center;
padding:0 14px;
margin-bottom:8px;
background:#131c31;
border-radius:16px;
color:white;
font-size:15px;
border:1px solid rgba(255,255,255,.04);
}

/* bottom visualizer */

.visual{
position:absolute;
bottom:0;
left:0;
width:100%;
height:60px;
display:flex;
align-items:flex-end;
justify-content:center;
gap:4px;
opacity:.2;
pointer-events:none;
}

.visual span{
width:6px;
height:20px;
border-radius:10px 10px 0 0;
background:linear-gradient(to top,var(--cyan),var(--pink));
animation:bars 1s ease-in-out infinite;
}

.visual span:nth-child(2){animation-delay:.1s}
.visual span:nth-child(3){animation-delay:.2s}
.visual span:nth-child(4){animation-delay:.3s}
.visual span:nth-child(5){animation-delay:.4s}
.visual span:nth-child(6){animation-delay:.5s}
.visual span:nth-child(7){animation-delay:.6s}
.visual span:nth-child(8){animation-delay:.7s}

@keyframes bars{
0%,100%{height:10px;}
50%{height:50px;}
}

/* responsive */

@media(max-width:420px){

.phone{
width:100vw;
height:100vh;
border-radius:0;
}

}

</style>
</head>

<body>

<div class="bg">
<div class="circle c1"></div>
<div class="circle c2"></div>
</div>

<div class="phone">

<div class="topbar">
<div>📶 5G</div>
<div id="clock">00:00</div>
<div>🔋100%</div>
</div>

<div class="content">

<div class="logo">OMEGA GAME</div>

<div class="display" id="display">---</div>

<div class="stats">

<div class="card">
USERS
<b id="usersCount">0</b>
</div>

<div class="card">
TRIES
<b id="tries">0</b>
</div>

<div class="card">
BEST
<b id="best">0</b>
</div>

<div class="card">
LEVEL
<b>∞</b>
</div>

</div>

<div class="keyboard">

<button class="key" onclick="pressNum(1)">1</button>
<button class="key" onclick="pressNum(2)">2</button>
<button class="key" onclick="pressNum(3)">3</button>

<button class="key" onclick="pressNum(4)">4</button>
<button class="key" onclick="pressNum(5)">5</button>
<button class="key" onclick="pressNum(6)">6</button>

<button class="key" onclick="pressNum(7)">7</button>
<button class="key" onclick="pressNum(8)">8</button>
<button class="key" onclick="pressNum(9)">9</button>

<button class="key" onclick="pressNum(0)">0</button>

</div>

<div class="actions">

<button class="clear" onclick="clearGuess()">
CLEAR
</button>

<button class="set" onclick="setGuess()">
SET
</button>

</div>

<div class="message" id="message"></div>

<div class="users">

<h3>ONLINE USERS</h3>

<div id="usersList"></div>

</div>

</div>

<div class="visual">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>

</div>

<script>

/* optimized ultra */

let currentGuess="";
let secretNumber=Math.floor(Math.random()*500000)+1;
let tries=0;
let best=0;

/* clock */

const clock=document.getElementById("clock");

function updateClock(){

const d=new Date();

clock.textContent=
String(d.getHours()).padStart(2,'0')
+":"+
String(d.getMinutes()).padStart(2,'0');

}

updateClock();

setInterval(updateClock,1000);

/* storage */

function getUsers(){
return JSON.parse(localStorage.getItem("allUsers")||"[]");
}

function saveUsers(users){
localStorage.setItem("allUsers",JSON.stringify(users));
}

/* create user */

function createUser(){

let myUser=localStorage.getItem("myUser");

if(!myUser){

let users=getUsers();

let name;

do{
name="user"+Math.floor(Math.random()*9000+1000);
}
while(users.includes(name));

users.push(name);

saveUsers(users);

localStorage.setItem("myUser",name);

return name;
}

return myUser;

}

/* users */

function updateUsers(){

const users=getUsers();

document.getElementById("usersCount").textContent=users.length;

let html="";

for(let i=0;i<users.length;i++){

html+=`
<div class="user">
⚡ ${users[i]}
</div>
`;

}

document.getElementById("usersList").innerHTML=html;

}

/* press */

function pressNum(n){

if(currentGuess.length>=8)return;

currentGuess+=n;

document.getElementById("display").textContent=currentGuess;

navigator.vibrate?.(10);

}

/* clear */

function clearGuess(){

currentGuess="";

document.getElementById("display").textContent="---";

showMessage("CLEARED","#aaa");

}

/* set */

function setGuess(){

if(currentGuess==="")return;

createUser();

tries++;

document.getElementById("tries").textContent=tries;

const guess=parseInt(currentGuess);

if(guess<secretNumber){

showMessage("HIGHER 🔼","#ffe600");

}
else if(guess>secretNumber){

showMessage("LOWER 🔽","#00ff99");

}
else{

showMessage("🎉 CORRECT","#00f0ff");

if(best===0 || tries<best){

best=tries;

document.getElementById("best").textContent=best;

}

tries=0;

document.getElementById("tries").textContent=0;

secretNumber=Math.floor(Math.random()*500000)+1;

}

currentGuess="";

document.getElementById("display").textContent="---";

updateUsers();

}

/* message */

const message=document.getElementById("message");

function showMessage(text,color){

message.textContent=text;

message.style.color=color;

}

/* start */

updateUsers();

</script>

</body>
</html>
